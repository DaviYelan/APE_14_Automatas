name: nlp-math-compiler

services:
  # ── Ollama: LLM local ────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: nlp-math-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ${OLLAMA_VOLUME_NAME:-ollama_data}:/root/.ollama
    networks:
      - red-compilador
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Servicio Semántico Java / Spring Boot ─────────────────────────────
  semantic:
    build:
      context: ./semantic
      dockerfile: Dockerfile
    container_name: nlp-math-semantic
    restart: unless-stopped
    environment:
      SEMANTIC_PORT: ${SEMANTIC_PORT:-8080}
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:1b}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-30}
    ports:
      - "${SEMANTIC_PORT:-8080}:${SEMANTIC_PORT:-8080}"
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - red-compilador
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${SEMANTIC_PORT:-8080}/semantic/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  # ── Backend Flask / Python ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nlp-math-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      OLLAMA_HOST: http://ollama:11434
      SEMANTIC_SERVICE_URL: http://semantic:${SEMANTIC_PORT:-8080}
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    depends_on:
      ollama:
        condition: service_healthy
      semantic:
        condition: service_healthy
    networks:
      - red-compilador
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${BACKEND_PORT:-8000}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Frontend React + Vite / Nginx ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: http://localhost:${BACKEND_PORT:-8000}
    container_name: nlp-math-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - red-compilador

networks:
  red-compilador:
    driver: bridge

volumes:
  ollama_data:
    name: ${OLLAMA_VOLUME_NAME:-ollama_data}
