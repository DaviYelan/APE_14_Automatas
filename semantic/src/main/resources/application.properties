# Puerto del microservicio semántico.
# Valor por defecto: 8080. Se sobreescribe con la variable de entorno
# SEMANTIC_PORT inyectada por docker-compose desde el archivo .env.
server.port=${SEMANTIC_PORT:8080}

# Host y modelo de Ollama — solo se usa para generar mensajes de error
# en lenguaje natural cuando hay errores semánticos. La lógica
# semántica real (tabla de símbolos, validaciones) está en Java puro.
ollama.host=${OLLAMA_HOST:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:llama3.2:1b}
ollama.timeout-seconds=${OLLAMA_TIMEOUT_SECONDS:30}

# Nombre que aparece en los logs del servicio
spring.application.name=semantic-analyzer

# Logging: mostrar trazas de análisis semántico en consola
logging.level.com.nlpmath=DEBUG
